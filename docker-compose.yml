# ─────────────────────────────────────────────────────────────
# Rede interna bridge — os containers se comunicam pelo nome
# ─────────────────────────────────────────────────────────────
networks:
  projeto-korp-net:
    driver: bridge
    name: projeto-korp-net

# ─────────────────────────────────────────────────────────────
# Volumes persistentes
# ─────────────────────────────────────────────────────────────
volumes:
  prometheus_data:
  grafana_data:

# ─────────────────────────────────────────────────────────────
# Serviços
# ─────────────────────────────────────────────────────────────
services:

  # ── 1. Aplicação Go ────────────────────────────────────────
  http-server-projeto-korp:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: http-server-projeto-korp
    image: http-server-projeto-korp:latest
    restart: unless-stopped
    networks:
      - projeto-korp-net
    # Não expõe portas ao host (acesso apenas via NGINX)
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── 2. NGINX — Proxy Reverso ───────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - projeto-korp-net
    depends_on:
      http-server-projeto-korp:
        condition: service_healthy

  # ── 3. Prometheus ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - projeto-korp-net
    depends_on:
      - http-server-projeto-korp

  # ── 4. Grafana ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/http-server-projeto-korp-dashboard.json
    networks:
      - projeto-korp-net
    depends_on:
      - prometheus
